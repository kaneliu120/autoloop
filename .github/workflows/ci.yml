name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MCP (contract tests)
        run: pip install mcp
      - name: Install package (wheel layout + scripts_directory)
        run: |
          pip install .
          python3 -c "from autoloop_scripts.locate import scripts_directory; p=scripts_directory(); assert (p/'autoloop-state.py').is_file(), p"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
